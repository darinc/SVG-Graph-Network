name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run (do not actually publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run tests
      run: npm run test

    - name: Check formatting
      run: npx prettier --check 'src/**/*.{ts,js}' 'tests/**/*.{ts,js}'

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Verify build artifacts
      run: |
        echo "Checking build artifacts..."
        ls -la dist/

        # Check UMD build
        test -f dist/SVGnet.min.js && echo "✓ UMD build exists"

        # Check ESM build
        test -f dist/SVGnet.esm.js && echo "✓ ESM build exists"

        # Check CJS build
        test -f dist/SVGnet.cjs && echo "✓ CJS build exists"

        # Check CSS
        test -f dist/SVGnet.css && echo "✓ CSS exists"

        # Check TypeScript declarations
        test -f dist/index.d.ts && echo "✓ TypeScript declarations exist"

        echo "All artifacts verified!"

    - name: Check bundle sizes
      run: npm run size

    - name: Extract version from tag
      if: startsWith(github.ref, 'refs/tags/v')
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Publishing version: $VERSION"

    - name: Verify package version matches tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        TAG_VERSION=${{ steps.version.outputs.version }}
        if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
          echo "Error: package.json version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)"
          exit 1
        fi
        echo "✓ Version match confirmed: $PACKAGE_VERSION"

    - name: Publish to npm (dry run)
      if: inputs.dry_run == true
      run: npm publish --dry-run
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Publish to npm
      if: inputs.dry_run != true
      run: npm publish --provenance --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          dist/SVGnet.min.js
          dist/SVGnet.esm.js
          dist/SVGnet.cjs
          dist/SVGnet.css

  notify:
    name: Post-publish notification
    runs-on: ubuntu-latest
    needs: publish
    if: always()

    steps:
    - name: Report publish status
      run: |
        if [ "${{ needs.publish.result }}" == "success" ]; then
          echo "✅ npm publish successful!"
          echo "📦 Package: https://www.npmjs.com/package/svgnet"
          echo "🌐 CDN (jsDelivr): https://cdn.jsdelivr.net/npm/svgnet/dist/SVGnet.min.js"
          echo "🌐 CDN (unpkg): https://unpkg.com/svgnet/dist/SVGnet.min.js"
        else
          echo "❌ npm publish failed!"
          exit 1
        fi
